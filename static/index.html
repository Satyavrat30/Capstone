<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House Predictor</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1e293b;
      --accent: #0f766e;
      --accent-hover: #115e59;
      --border: #dbe4ef;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top right, #e8f2ff 0%, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 920px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 20px; opacity: 0.85; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 16px;
    }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    input:focus { border-color: var(--accent); }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    button {
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    button:hover { background: var(--accent-hover); }

    #result {
      font-size: 16px;
      font-weight: 700;
      min-height: 22px;
    }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>House Price Predictor</h1>

    <section class="grid">
      <div>
        <label for="crim">Crime Rate (crim)</label>
        <input id="crim" type="number" step="0.01" value="0.03" />
      </div>
      <div>
        <label for="zn">Residential Land Zoned (zn)</label>
        <input id="zn" type="number" step="0.1" value="0" />
      </div>
      <div>
        <label for="indus">Non-retail Land (indus)</label>
        <input id="indus" type="number" step="0.01" value="7.07" />
      </div>
      <div>
        <label for="chas">Charles River Dummy (chas: 0 or 1)</label>
        <input id="chas" type="number" step="1" min="0" max="1" value="0" />
      </div>
      <div>
        <label for="nox">NOx Concentration (nox)</label>
        <input id="nox" type="number" step="0.001" value="0.469" />
      </div>
      <div>
        <label for="rm">Average Rooms per Dwelling (rm)</label>
        <input id="rm" type="number" step="0.01" value="6.4" />
      </div>
      <div>
        <label for="age">Owner-occupied Units Built Prior 1940 (age)</label>
        <input id="age" type="number" step="0.1" value="78.9" />
      </div>
      <div>
        <label for="dis">Distance to Employment Centers (dis)</label>
        <input id="dis" type="number" step="0.0001" value="4.9671" />
      </div>
      <div>
        <label for="rad">Highway Access Index (rad)</label>
        <input id="rad" type="number" step="1" value="2" />
      </div>
      <div>
        <label for="tax">Property Tax Rate (tax)</label>
        <input id="tax" type="number" step="1" value="242" />
      </div>
      <div>
        <label for="ptratio">Pupil-Teacher Ratio (ptratio)</label>
        <input id="ptratio" type="number" step="0.1" value="17.8" />
      </div>
      <div>
        <label for="b">1000(Bk - 0.63)^2 (b)</label>
        <input id="b" type="number" step="0.01" value="396.9" />
      </div>
      <div>
        <label for="lstat">% Lower Status Population (lstat)</label>
        <input id="lstat" type="number" step="0.01" value="9.14" />
      </div>
    </section>

    <div class="actions">
      <button id="predictBtn" type="button">Predict</button>
      <div id="result"></div>
    </div>
  </main>

  <script src="/static/script.js"></script>
</body>
</html>
